name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X 'github.com/firoyang/pkv/internal/version.Version=${VERSION}' -X 'github.com/firoyang/pkv/internal/version.Commit=${COMMIT}' -X 'github.com/firoyang/pkv/internal/version.Date=${DATE}'"
          
          OUTPUT_NAME="pkv_${{ matrix.goos }}_${{ matrix.goarch }}"
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT_NAME}" .
          
          # Create checksums
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"
      
      - uses: actions/upload-artifact@v3
        with:
          name: binaries
          path: |
            pkv_*
            *.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: binaries
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pkv_*
            *.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
