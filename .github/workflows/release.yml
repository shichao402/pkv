name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          FILE_VERSION="v$(python3 -c "import json; print(json.load(open('version.json'))['version'])")"
          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag ($TAG) does not match version.json ($FILE_VERSION)"
            exit 1
          fi
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="v$(python3 -c "import json; print(json.load(open('version.json'))['version'])")"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MODULE="github.com/shichao402/pkv"
          LDFLAGS="-s -w -X '${MODULE}/internal/version.Version=${VERSION}' -X '${MODULE}/internal/version.Commit=${COMMIT}' -X '${MODULE}/internal/version.Date=${DATE}'"
          
          OUTPUT_NAME="pkv_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT_NAME}" .
      
      - uses: actions/upload-artifact@v4
        with:
          name: pkv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pkv_*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkv-*
          merge-multiple: true
      
      - name: List artifacts
        run: ls -lh pkv_*

      - name: Generate checksums
        run: sha256sum pkv_* > checksums.sha256

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            pkv_* \
            checksums.sha256
