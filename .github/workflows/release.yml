name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA:0:7}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MODULE="github.com/shichao402/pkv"
          LDFLAGS="-s -w -X '${MODULE}/internal/version.Version=${VERSION}' -X '${MODULE}/internal/version.Commit=${COMMIT}' -X '${MODULE}/internal/version.Date=${DATE}'"
          
          OUTPUT_NAME="pkv_${{ matrix.goos }}_${{ matrix.goarch }}"
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT_NAME}" .
          
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"
      
      - uses: actions/upload-artifact@v4
        with:
          name: pkv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            pkv_*
            *.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkv-*
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkv_*
            *.sha256
          draft: false
          prerelease: false
