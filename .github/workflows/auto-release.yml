name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.meta.outputs.version }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release version
        id: meta
        run: |
          git fetch --force --tags
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Preparing release ${TAG} from version.json"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "${{ github.sha }}"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="v${{ needs.prepare.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MODULE="github.com/shichao402/pkv"
          LDFLAGS="-s -w -X '${MODULE}/internal/version.Version=${VERSION}' -X '${MODULE}/internal/version.Commit=${COMMIT}' -X '${MODULE}/internal/version.Date=${DATE}'"

          OUTPUT_NAME="pkv_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT_NAME}" .

      - uses: actions/upload-artifact@v4
        with:
          name: pkv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pkv_*
          retention-days: 1

  release:
    name: Create Release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkv-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh pkv_*

      - name: Generate checksums
        run: sha256sum pkv_* > checksums.sha256

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --generate-notes \
            pkv_* \
            checksums.sha256
